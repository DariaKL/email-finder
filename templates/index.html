<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Finder — Airtable</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',system-ui,-apple-system,sans-serif; background:#f5f5f5; color:#333; }
.header { background:linear-gradient(135deg,#1976D2,#1565C0); color:#fff; padding:16px 24px; display:flex; align-items:center; gap:16px; }
.header h1 { font-size:20px; font-weight:600; }
.header .badge { background:rgba(255,255,255,.2); padding:4px 12px; border-radius:12px; font-size:12px; }
.tabs { display:flex; background:#fff; border-bottom:2px solid #e0e0e0; padding:0 16px; }
.tab { padding:12px 24px; cursor:pointer; font-weight:600; font-size:14px; color:#666; border-bottom:3px solid transparent; transition:.2s; position:relative; }
.tab:hover { color:#1976D2; background:#f0f6ff; }
.tab.active { color:#1976D2; border-bottom-color:#1976D2; }
.tab .tab-badge { position:absolute; top:6px; right:6px; background:#f44336; color:#fff; font-size:10px; padding:1px 6px; border-radius:8px; display:none; }
.tab.running { color:#4CAF50; }
.tab.running::after { content:''; position:absolute; bottom:0; left:0; right:0; height:3px; background:#4CAF50; animation:pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.container { max-width:1400px; margin:0 auto; padding:16px; }
.controls { display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-bottom:16px; }
.btn { padding:10px 20px; border:none; border-radius:6px; font-weight:600; font-size:13px; cursor:pointer; transition:.2s; display:flex; align-items:center; gap:6px; }
.btn:disabled { opacity:.5; cursor:not-allowed; }
.btn-start { background:#4CAF50; color:#fff; }
.btn-start:hover:not(:disabled) { background:#43A047; }
.btn-stop { background:#f44336; color:#fff; }
.btn-stop:hover:not(:disabled) { background:#E53935; }
.btn-start-all { background:#1976D2; color:#fff; }
.btn-start-all:hover:not(:disabled) { background:#1565C0; }
.btn-stop-all { background:#FF9800; color:#fff; }
.btn-stop-all:hover:not(:disabled) { background:#F57C00; }
.stats { display:flex; gap:20px; margin-left:auto; flex-wrap:wrap; }
.stat { font-size:13px; font-weight:600; }
.stat.need { color:#f44336; }
.stat.has { color:#4CAF50; }
.stat.total { color:#666; }
.status-label { font-size:14px; font-weight:600; padding:4px 12px; border-radius:4px; }
.status-label.loading { background:#FFF3E0; color:#E65100; }
.status-label.running { background:#E8F5E9; color:#2E7D32; }
.status-label.stopped { background:#FFEBEE; color:#C62828; }
.status-label.done { background:#E3F2FD; color:#1565C0; }
.progress-wrap { margin-bottom:16px; }
.progress-bar { height:24px; background:#e0e0e0; border-radius:12px; overflow:hidden; position:relative; }
.progress-fill { height:100%; background:linear-gradient(90deg,#4CAF50,#66BB6A); transition:width .3s; border-radius:12px; }
.progress-text { position:absolute; top:0; left:0; right:0; text-align:center; line-height:24px; font-size:12px; font-weight:600; color:#333; }
.content-split { display:grid; grid-template-rows:1fr 280px; gap:12px; height:calc(100vh - 280px); min-height:400px; }
.results-table { overflow:auto; background:#fff; border-radius:8px; box-shadow:0 1px 3px rgba(0,0,0,.1); }
table { width:100%; border-collapse:collapse; font-size:13px; }
thead { position:sticky; top:0; z-index:1; }
th { background:#f5f5f5; padding:10px 12px; text-align:left; font-weight:600; border-bottom:2px solid #e0e0e0; }
td { padding:8px 12px; border-bottom:1px solid #f0f0f0; }
tr:hover { background:#f8f9fa; }
.status-found { color:#4CAF50; font-weight:600; }
.status-not-found { color:#f44336; font-weight:600; }
.log-panel { background:#1e1e1e; color:#d4d4d4; border-radius:8px; overflow:auto; padding:12px; font-family:'Consolas','Courier New',monospace; font-size:12px; line-height:1.5; }
.log-panel .log-line { white-space:pre-wrap; word-break:break-all; }
.log-panel .log-error { color:#ff6b6b; }
.tab-content { display:none; }
.tab-content.active { display:block; }
.empty-state { text-align:center; padding:60px 20px; color:#999; }
.empty-state svg { width:64px; height:64px; fill:#ddd; margin-bottom:16px; }
</style>
</head>
<body>

<div class="header">
    <h1>📧 Email Finder</h1>
    <span class="badge">Airtable Integration</span>
</div>

<div class="tabs" id="tabBar">
    {% for t in tables %}
    <div class="tab{% if loop.first %} active{% endif %}" data-tab="{{ t }}" onclick="switchTab('{{ t }}')">
        {{ t }}
        <span class="tab-badge" id="badge-{{ t }}"></span>
    </div>
    {% endfor %}
</div>

<div class="container">
    <div class="controls">
        <button class="btn btn-start-all" onclick="startAll()">▶▶ Start All</button>
        <button class="btn btn-stop-all" onclick="stopAll()">■■ Stop All</button>
        <div class="stats" id="globalStats"></div>
    </div>

    {% for t in tables %}
    <div class="tab-content{% if loop.first %} active{% endif %}" id="panel-{{ t }}">
        <div class="controls">
            <button class="btn btn-start" id="btnStart-{{ t }}" onclick="startTab('{{ t }}')">▶ Start</button>
            <button class="btn btn-stop" id="btnStop-{{ t }}" onclick="stopTab('{{ t }}')" disabled>■ Stop</button>
            <span class="status-label" id="statusLabel-{{ t }}">Idle</span>
            <div class="stats">
                <span class="stat total" id="statTotal-{{ t }}">Total: —</span>
                <span class="stat need" id="statNeed-{{ t }}">Need: —</span>
                <span class="stat has" id="statHas-{{ t }}">Has: —</span>
            </div>
        </div>
        <div class="progress-wrap">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill-{{ t }}" style="width:0%"></div>
                <div class="progress-text" id="progressText-{{ t }}">Idle</div>
            </div>
        </div>
        <div class="content-split">
            <div class="results-table">
                <table>
                    <thead><tr><th style="width:5%">#</th><th style="width:30%">Domain</th><th style="width:45%">Emails</th><th style="width:20%">Status</th></tr></thead>
                    <tbody id="tbody-{{ t }}"></tbody>
                </table>
                <div class="empty-state" id="empty-{{ t }}">
                    <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
                    <p>Натисніть <b>Start</b> для запуску пошуку</p>
                </div>
            </div>
            <div class="log-panel" id="log-{{ t }}"></div>
        </div>
    </div>
    {% endfor %}
</div>

<script>
const state = {};
const TABLES = {{ tables | tojson }};

TABLES.forEach(t => {
    state[t] = { taskId: null, evtSource: null, status: 'idle', rowCount: 0 };
});

function switchTab(name) {
    document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelector(`.tab[data-tab="${name}"]`).classList.add('active');
    document.getElementById(`panel-${name}`).classList.add('active');
}

function setStatus(tab, status) {
    state[tab].status = status;
    const lbl = document.getElementById(`statusLabel-${tab}`);
    const map = { loading:'Loading...', running:'Running', stopped:'Stopped', done:'Done', idle:'Idle' };
    lbl.textContent = map[status] || status;
    lbl.className = 'status-label ' + status;
    const tabEl = document.querySelector(`.tab[data-tab="${tab}"]`);
    tabEl.classList.toggle('running', status === 'running' || status === 'loading');
    const isActive = status === 'loading' || status === 'running';
    document.getElementById(`btnStart-${tab}`).disabled = isActive;
    document.getElementById(`btnStop-${tab}`).disabled = !isActive;
}

function addLog(tab, msg, isError) {
    const log = document.getElementById(`log-${tab}`);
    const div = document.createElement('div');
    div.className = 'log-line' + (isError ? ' log-error' : '');
    div.textContent = msg;
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
}

function addResult(tab, domain, emails, status) {
    const tbody = document.getElementById(`tbody-${tab}`);
    const empty = document.getElementById(`empty-${tab}`);
    if (empty) empty.style.display = 'none';
    state[tab].rowCount++;
    const tr = document.createElement('tr');
    const cls = status === 'found' ? 'status-found' : 'status-not-found';
    const statusText = status === 'found' ? '✓ Found' : '✗ Not found';
    tr.innerHTML = `<td>${state[tab].rowCount}</td><td>${esc(domain)}</td><td>${esc(emails)}</td><td class="${cls}">${statusText}</td>`;
    tbody.appendChild(tr);
    const container = tbody.closest('.results-table');
    container.scrollTop = container.scrollHeight;
}

function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

function updateProgress(tab, processed, total) {
    const pct = total > 0 ? Math.round(100 * processed / total) : 0;
    document.getElementById(`progressFill-${tab}`).style.width = pct + '%';
    document.getElementById(`progressText-${tab}`).textContent = total > 0 ? `${processed}/${total} (${pct}%)` : 'Idle';
}

function updateCounts(tab, data) {
    if (data.total !== undefined) document.getElementById(`statTotal-${tab}`).textContent = `Total: ${data.total}`;
    if (data.need !== undefined) {
        document.getElementById(`statNeed-${tab}`).textContent = `Need: ${data.need}`;
        const badge = document.getElementById(`badge-${tab}`);
        if (data.need > 0) { badge.textContent = data.need; badge.style.display = 'inline'; }
        else { badge.style.display = 'none'; }
    }
    if (data.has !== undefined) document.getElementById(`statHas-${tab}`).textContent = `Has: ${data.has}`;
}

function startTab(tab) {
    if (state[tab].status === 'running' || state[tab].status === 'loading') return;

    // Clear UI
    document.getElementById(`tbody-${tab}`).innerHTML = '';
    document.getElementById(`log-${tab}`).innerHTML = '';
    const empty = document.getElementById(`empty-${tab}`);
    if (empty) empty.style.display = 'block';
    state[tab].rowCount = 0;
    updateProgress(tab, 0, 0);
    setStatus(tab, 'loading');

    fetch('/start', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ table: tab })
    })
    .then(r => r.json())
    .then(data => {
        if (data.error) { addLog(tab, '[ERROR] ' + data.error, true); setStatus(tab, 'stopped'); return; }
        state[tab].taskId = data.task_id;
        listenSSE(tab, data.task_id);
    })
    .catch(err => { addLog(tab, '[ERROR] ' + err, true); setStatus(tab, 'stopped'); });
}

function stopTab(tab) {
    if (!state[tab].taskId) return;
    fetch(`/stop/${state[tab].taskId}`, { method: 'POST' });
}

function startAll() { TABLES.forEach(t => startTab(t)); }
function stopAll() { TABLES.forEach(t => stopTab(t)); }

function listenSSE(tab, taskId) {
    if (state[tab].evtSource) state[tab].evtSource.close();
    const es = new EventSource(`/events/${taskId}`);
    state[tab].evtSource = es;

    es.addEventListener('status', e => {
        const d = JSON.parse(e.data);
        setStatus(tab, d.status);
    });

    es.addEventListener('log', e => {
        const d = JSON.parse(e.data);
        addLog(tab, d.msg);
    });

    es.addEventListener('error_msg', e => {
        const d = JSON.parse(e.data);
        addLog(tab, '[ERROR] ' + d.msg, true);
    });

    es.addEventListener('counts', e => {
        const d = JSON.parse(e.data);
        updateCounts(tab, d);
    });

    es.addEventListener('result', e => {
        const d = JSON.parse(e.data);
        addResult(tab, d.domain, d.emails, d.status);
        updateProgress(tab, d.processed, d.total);
        // Update ongoing counts
        updateCounts(tab, { need: d.total - d.processed });
    });

    es.addEventListener('done', () => {
        es.close();
        state[tab].evtSource = null;
    });

    es.onerror = () => {
        es.close();
        state[tab].evtSource = null;
        if (state[tab].status === 'running' || state[tab].status === 'loading') {
            setStatus(tab, 'stopped');
            addLog(tab, '[Connection lost]', true);
        }
    };
}

// Load initial stats
TABLES.forEach(t => {
    fetch(`/stats/${t}`)
    .then(r => r.json())
    .then(d => { if (!d.error) updateCounts(t, d); })
    .catch(() => {});
});
</script>
</body>
</html>
